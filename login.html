<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temple Admin — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #8a6f2e;
      --deep: #0a0704;
      --panel: #120e08;
      --surface: #1c1508;
      --border: rgba(201, 168, 76, 0.25);
      --text: #e8dfc8;
      --muted: #8a7d62;
      --error: #c0392b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: var(--deep);
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Mandala background */
    .bg-mandala {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-mandala svg {
      width: 100%;
      height: 100%;
      opacity: 0.04;
    }

    /* Ambient glow */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb.top {
      width: 500px; height: 500px;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 70%);
    }

    .glow-orb.bottom {
      width: 400px; height: 400px;
      bottom: -150px; right: -100px;
      background: radial-gradient(circle, rgba(180,100,30,0.12) 0%, transparent 70%);
    }

    /* Login container */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1rem;
    }

    /* Top emblem */
    .emblem {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeDown 0.8s ease both;
    }

    .emblem-lamp {
      font-size: 2.8rem;
      display: block;
      margin-bottom: 0.4rem;
      filter: drop-shadow(0 0 16px rgba(201,168,76,0.5));
      animation: lampPulse 3s ease-in-out infinite;
    }

    @keyframes lampPulse {
      0%, 100% { filter: drop-shadow(0 0 16px rgba(201,168,76,0.5)); }
      50%       { filter: drop-shadow(0 0 28px rgba(201,168,76,0.9)); }
    }

    .emblem-title {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .emblem-sub {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 0.2rem;
      letter-spacing: 0.04em;
    }

    /* Decorative divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1.2rem 0;
      opacity: 0.5;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }

    .divider::after {
      background: linear-gradient(to left, transparent, var(--gold));
    }

    .divider-gem { color: var(--gold); font-size: 0.7rem; }

    /* Card */
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.4rem 2.2rem 2rem;
      position: relative;
      animation: fadeUp 0.8s 0.15s ease both;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.06),
        0 24px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(201,168,76,0.15);
    }

    /* Corner ornaments */
    .login-card::before,
    .login-card::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--gold-dim);
      border-style: solid;
      opacity: 0.6;
    }

    .login-card::before {
      top: 10px; left: 10px;
      border-width: 1px 0 0 1px;
    }

    .login-card::after {
      bottom: 10px; right: 10px;
      border-width: 0 1px 1px 0;
    }

    .card-corner-tr, .card-corner-bl {
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--gold-dim);
      border-style: solid;
      opacity: 0.6;
    }

    .card-corner-tr { top: 10px; right: 10px; border-width: 1px 1px 0 0; }
    .card-corner-bl { bottom: 10px; left: 10px; border-width: 0 0 1px 1px; }

    .card-heading {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.8rem;
      opacity: 0.85;
    }

    /* Form */
    .form-field {
      margin-bottom: 1.3rem;
    }

    label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 2px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      letter-spacing: 0.03em;
    }

    input[type="password"] { letter-spacing: 0.15em; }

    input:focus {
      border-color: rgba(201,168,76,0.55);
      background: rgba(201,168,76,0.04);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.07), inset 0 1px 0 rgba(201,168,76,0.06);
    }

    input::placeholder { color: rgba(138,125,98,0.45); font-style: italic; }

    .input-wrap { position: relative; }

    .toggle-pw {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: 0;
      transition: color 0.2s;
      line-height: 1;
    }

    .toggle-pw:hover { color: var(--gold); }

    /* Submit btn */
    .btn-login {
      width: 100%;
      margin-top: 1.8rem;
      padding: 0.85rem;
      background: linear-gradient(135deg, #8a6f2e 0%, #c9a84c 50%, #8a6f2e 100%);
      background-size: 200% auto;
      border: none;
      border-radius: 2px;
      color: var(--deep);
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-position 0.5s, box-shadow 0.3s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }

    .btn-login:hover {
      background-position: right center;
      box-shadow: 0 0 24px rgba(201,168,76,0.35), 0 4px 16px rgba(0,0,0,0.4);
    }

    .btn-login:active {
      transform: scale(0.985);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Error message */
    .error-msg {
      display: none;
      background: rgba(192,57,43,0.1);
      border: 1px solid rgba(192,57,43,0.3);
      border-radius: 2px;
      padding: 0.65rem 0.9rem;
      color: #e07060;
      font-size: 0.92rem;
      margin-top: 1rem;
      font-style: italic;
      text-align: center;
      animation: shake 0.4s ease;
    }

    .error-msg.visible { display: block; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }

    /* Loading spinner inside button */
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(10,7,4,0.3);
      border-top-color: var(--deep);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: block; }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 1.6rem;
      color: var(--muted);
      font-size: 0.82rem;
      font-style: italic;
      animation: fadeUp 0.8s 0.3s ease both;
      opacity: 0.7;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Success overlay */
    .success-overlay {
      position: fixed;
      inset: 0;
      background: var(--deep);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    .success-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .success-lamp {
      font-size: 4rem;
      animation: lampPulse 1.5s ease-in-out infinite;
      margin-bottom: 1rem;
    }

    .success-text {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: 0.2em;
    }

    /* Subtle particle dots */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: float var(--dur) var(--delay) ease-in-out infinite;
    }

    @keyframes float {
      0%   { opacity: 0; transform: translateY(0) translateX(0); }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.15; }
      100% { opacity: 0; transform: translateY(-120px) translateX(var(--drift)); }
    }
  </style>
</head>
<body>

  <!-- Mandala background -->
  <div class="bg-mandala" aria-hidden="true">
    <svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(400,400)">
        <circle r="380" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
        <circle r="320" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
        <circle r="260" fill="none" stroke="#c9a84c" stroke-width="1"/>
        <circle r="200" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
        <circle r="140" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
        <circle r="80"  fill="none" stroke="#c9a84c" stroke-width="1"/>
        <circle r="30"  fill="none" stroke="#c9a84c" stroke-width="0.5"/>
        <!-- 8-petal lotus -->
        <g id="petals">
          <ellipse rx="60" ry="120" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="rotate(0)  translate(0,-170)"/>
          <ellipse rx="60" ry="120" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="rotate(45) translate(0,-170)"/>
          <ellipse rx="60" ry="120" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="rotate(90) translate(0,-170)"/>
          <ellipse rx="60" ry="120" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="rotate(135) translate(0,-170)"/>
          <ellipse rx="60" ry="120" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="rotate(180) translate(0,-170)"/>
          <ellipse rx="60" ry="120" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="rotate(225) translate(0,-170)"/>
          <ellipse rx="60" ry="120" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="rotate(270) translate(0,-170)"/>
          <ellipse rx="60" ry="120" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="rotate(315) translate(0,-170)"/>
        </g>
        <!-- Radial lines -->
        <g stroke="#c9a84c" stroke-width="0.4">
          <line x1="0" y1="-380" x2="0" y2="380"/>
          <line x1="-380" y1="0" x2="380" y2="0"/>
          <line x1="-269" y1="-269" x2="269" y2="269"/>
          <line x1="269" y1="-269" x2="-269" y2="269"/>
          <line x1="-145" y1="-355" x2="145" y2="355"/>
          <line x1="355" y1="-145" x2="-355" y2="145"/>
          <line x1="145" y1="-355" x2="-145" y2="355"/>
          <line x1="-355" y1="-145" x2="355" y2="145"/>
        </g>
        <!-- Small diamonds -->
        <g fill="#c9a84c" opacity="0.8">
          <polygon points="0,-8 5,0 0,8 -5,0" transform="rotate(0)  translate(0,-320)"/>
          <polygon points="0,-8 5,0 0,8 -5,0" transform="rotate(45) translate(0,-320)"/>
          <polygon points="0,-8 5,0 0,8 -5,0" transform="rotate(90) translate(0,-320)"/>
          <polygon points="0,-8 5,0 0,8 -5,0" transform="rotate(135) translate(0,-320)"/>
          <polygon points="0,-8 5,0 0,8 -5,0" transform="rotate(180) translate(0,-320)"/>
          <polygon points="0,-8 5,0 0,8 -5,0" transform="rotate(225) translate(0,-320)"/>
          <polygon points="0,-8 5,0 0,8 -5,0" transform="rotate(270) translate(0,-320)"/>
          <polygon points="0,-8 5,0 0,8 -5,0" transform="rotate(315) translate(0,-320)"/>
        </g>
      </g>
    </svg>
  </div>

  <div class="glow-orb top" aria-hidden="true"></div>
  <div class="glow-orb bottom" aria-hidden="true"></div>
  <div class="particles" id="particles" aria-hidden="true"></div>

  <!-- Login -->
  <div class="login-wrapper" role="main">
    <div class="emblem">
      <span class="emblem-lamp">🪔</span>
      <div class="emblem-title">Temple Admin</div>
      <div class="emblem-sub">Sanctum Management Portal</div>
    </div>

    <div class="login-card">
      <div class="card-corner-tr"></div>
      <div class="card-corner-bl"></div>

      <div class="card-heading">Authorised Entry</div>

      <div class="form-field">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          placeholder="Enter username"
          autocomplete="username"
          autofocus
        >
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            placeholder="Enter password"
            autocomplete="current-password"
          >
          <button class="toggle-pw" type="button" onclick="togglePassword()" aria-label="Toggle password visibility" id="toggleBtn">👁</button>
        </div>
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <span class="btn-text">Enter Dashboard</span>
        <div class="spinner"></div>
      </button>

      <div class="error-msg" id="errorMsg" role="alert">
        Incorrect credentials. Please try again.
      </div>

      <div class="divider"><span class="divider-gem">✦</span></div>
    </div>

    <p class="login-footer">Access restricted to temple administrators</p>
  </div>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay" aria-live="polite">
    <div class="success-lamp">🪔</div>
    <div class="success-text">Welcome, Administrator</div>
  </div>

  <script>
    // ─── Credentials ─────────────────────────────────────────
    // Change these values as needed.
    const ADMIN_USERNAME = 'admin';
    const ADMIN_PASSWORD = 'temple2024';
    // ─────────────────────────────────────────────────────────

    // Particles
    (function spawnParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 24; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.cssText = `
          left: ${Math.random() * 100}%;
          bottom: ${Math.random() * 30}%;
          --dur: ${4 + Math.random() * 6}s;
          --delay: ${Math.random() * 6}s;
          --drift: ${(Math.random() - 0.5) * 60}px;
        `;
        container.appendChild(p);
      }
    })();

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    function togglePassword() {
      const pw = document.getElementById('password');
      const btn = document.getElementById('toggleBtn');
      if (pw.type === 'password') {
        pw.type = 'text';
        btn.textContent = '🙈';
      } else {
        pw.type = 'password';
        btn.textContent = '👁';
      }
    }

    function handleLogin() {
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      // Loading state
      btn.classList.add('loading');
      btn.disabled = true;
      errorMsg.classList.remove('visible');

      // Simulate a brief auth delay for feel
      setTimeout(() => {
        if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
          // Success
          const overlay = document.getElementById('successOverlay');
          overlay.classList.add('active');
          // Redirect after a moment
          setTimeout(() => {
            window.location.href = 'admin.html';
          }, 1400);
        } else {
          btn.classList.remove('loading');
          btn.disabled = false;
          showError('Incorrect credentials. Please try again.');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      }, 700);
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.remove('visible');
      // Force reflow for re-animation
      void el.offsetWidth;
      el.classList.add('visible');
    }
  </script>
</body>
</html>
